<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gerenciador de Tarefas</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>Minhas Tarefas</h1>

  <!-- area para adicionar uma nova tarefa -->
  <div id="form-tarefa">
    <input type="text" id="input-tarefa" placeholder="Digite uma nova tarefa...">
    <button id="botao-adicionar">Adicionar</button>
  </div>

  <!-- botoes para escolher quais tarefas aparecem na lista -->
  <div id="filtros">
    <button id="filtro-todas">Todas</button>
    <button id="filtro-pendentes">Pendentes</button>
    <button id="filtro-concluidas">Concluídas</button>
  </div>

  <!-- lista de tarefas, comeca vazia -->
  <!-- o JavaScript vai criar os <li> aqui dentro -->
  <ul id="lista-tarefas"></ul>

  <script src="script.js"></script>
</body>
</html>
